resources:
  jobs:
    inventory_optimization_crash_course:
      name: "inventory-optimization-crash-course"
      description: "Run the public inventory optimization notebook on serverless, compare solver libraries in MLflow, and optionally deploy the champion."
      tasks:
        - task_key: run_inventory_notebook
          notebook_task:
            notebook_path: ../notebooks/inventory_optimization_crash_course.py
            base_parameters:
              experiment_name: ${var.experiment_name}
              registered_model_name: ${var.registered_model_name}
              endpoint_name: ${var.endpoint_name}
              catalog: ${var.catalog}
              schema: ${var.schema}
              seed: ${var.seed}
              scenario_count: ${var.scenario_count}
              deploy_endpoint: ${var.deploy_endpoint}
          timeout_seconds: 5400
      permissions:
        - level: CAN_VIEW
          group_name: "users"
