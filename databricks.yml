bundle:
  name: mlflow-or-crash-course
  databricks_cli_version: ">= 0.292.0"

include:
  - resources/*.yml

experimental:
  skip_name_prefix_for_schema: true

variables:
  catalog:
    default: "main"
  schema:
    default: "or_blog_josh_melton"
  experiment_name:
    default: "/Users/josh.melton@databricks.com/inventory-optimization-crash-course"
  registered_model_name:
    default: "main.or_blog_josh_melton.inventory_optimizer"
  endpoint_name:
    default: "inventory-optimizer-endpoint"
  scenario_count:
    default: "6"
  seed:
    default: "7"
  deploy_endpoint:
    default: "true"

targets:
  azure:
    default: true
    mode: development
    workspace:
      profile: azure
